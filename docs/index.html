    <title>kei-music</title>
    <style>
      /* Light Mode 默认主题 */
      :root {
        --bg-color: #faf5ff; /* 浅紫色/暖灰色背景 */
        --text-color-primary: #B57EDC; /* 薰衣草紫 */
        
        /* 字母颜色 (Light Mode) - 恢复为高饱和度的彩虹色 */
        --color-m: #FF6B6B; /* 珊瑚红 - M */
        --color-u1: #4ECDC4; /* 青绿色 - U */
        --color-s1: #FFE66D; /* 柠檬黄 - S */
        --color-i1: #1A535C; /* 深青色 - I */
        --color-c: #FF9F1C; /* 琥珀色 - C */
        --color-s2: #2A9D8F; /* 绿松石 - S */
        --color-t: #E76F51; /* 锈橙 - T */
        --color-u2: #9B5DE5; /* 紫罗兰 - U */
        --color-d: #00BBF9; /* 天蓝色 - D */
        --color-i2: #F15BB5; /* 粉粉色 - I */
        --color-o: #00F5D4; /* 明亮薄荷绿 - O */
      }

      /* Dark Mode 主题 */
      .dark {
        --bg-color: #1a1a2e; /* 深蓝灰色 */
        --text-color-primary: #e0aaff; /* 浅薰衣草紫/紫丁香 */
        
        /* 字母颜色 (Dark Mode) - 使用更亮的对应色以保证在深色背景下清晰可见 */
        --color-m: #ff7675; /* 淡珊瑚红 - M */
        --color-u1: #74b9ff; /* 淡天蓝色 - U */
        --color-s1: #fdcb6e; /* 淡琥珀色 - S */
        --color-i1: #00b894; /* 淡薄荷绿 - I */
        --color-c: #e17055; /* 淡锈橙 - C */
        --color-s2: #55a630; /* 淡酸橙绿 - S */
        --color-t: #fd79a8; /* 淡粉红色 - T */
        --color-u2: #a29bfe; /* 淡紫罗兰 - U */
        --color-d: #7ed6df; /* 淡青瓷色 - D */
        --color-i2: #fab1a0; /* 淡桃色 - I */
        --color-o: #81ecec; /* 淡水鸭蓝 - O */
      }

      #root > .loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* 使用变量 */
        color: var(--text-color-primary);
        background-color: var(--bg-color);
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      /* 定义单个字母的蹦跳动画 - 降低高度，增加丝滑感 */
      @keyframes letterBounce {
        0%, 100% {
          transform: translateY(0) scaleY(1);
          /* 平缓开始 */
          animation-timing-function: cubic-bezier(0.42, 0, 0.58, 1);
        }
        30% {
          /* 跳起，压缩 */
          transform: translateY(-8%) scaleY(1.05);
          /* 快速上升 */
          animation-timing-function: cubic-bezier(0.33, 0.66, 0.67, 1);
        }
        50% {
          /* 落下，拉伸 */
          transform: translateY(0) scaleY(0.95);
          /* 准备触底反弹 */
          animation-timing-function: cubic-bezier(0.33, 0, 0.67, 0.33);
        }
        70% {
          /* 反弹，轻微压缩 */
          transform: translateY(-3%) scaleY(1.02);
          /* 回落 */
          animation-timing-function: cubic-bezier(0.33, 0.66, 0.67, 1);
        }
      }

      /* 为所有字母应用相同的动画，但通过延迟实现波浪效果 */
      .loader-letter {
        animation: 
          letterBounce 1.5s ease-in-out infinite;
        transform-origin: bottom center;
      }

      /* 为每个字母设置颜色 */
      .loader-letter_M1 { fill: var(--color-m); } /* M */
      .loader-letter_U1 { fill: var(--color-u1); } /* U */
      .loader-letter_S1 { fill: var(--color-s1); } /* S */
      .loader-letter_I1 { fill: var(--color-i1); } /* I */
      .loader-letter_C1 { fill: var(--color-c); } /* C */
      .loader-letter_S2 { fill: var(--color-s2); } /* S */
      .loader-letter_T1 { fill: var(--color-t); } /* T */
      .loader-letter_U2 { fill: var(--color-u2); } /* U */
      .loader-letter_D1 { fill: var(--color-d); } /* D */
      .loader-letter_I2 { fill: var(--color-i2); } /* I */
      .loader-letter_O1 { fill: var(--color-o); } /* O */

      /* 为每个字母设置递增的动画延迟 */
      .loader-letter_M1 { animation-delay: calc(0 * 0.136s), 0s; }
      .loader-letter_U1 { animation-delay: calc(1 * 0.136s), 0s; }
      .loader-letter_S1 { animation-delay: calc(2 * 0.136s), 0s; }
      .loader-letter_I1 { animation-delay: calc(3 * 0.136s), 0s; }
      .loader-letter_C1 { animation-delay: calc(4 * 0.136s), 0s; }
      .loader-letter_S2 { animation-delay: calc(5 * 0.136s), 0s; }
      .loader-letter_T1 { animation-delay: calc(6 * 0.136s), 0s; }
      .loader-letter_U2 { animation-delay: calc(7 * 0.136s), 0s; }
      .loader-letter_D1 { animation-delay: calc(8 * 0.136s), 0s; }
      .loader-letter_I2 { animation-delay: calc(9 * 0.136s), 0s; }
      .loader-letter_O1 { animation-delay: calc(10 * 0.136s), 0s; }


      /* 颜色渐变动画：在字母自身颜色和主色调之间循环 */
      @keyframes letterColorShift {
          0%, 100% { fill: currentColor; } /* 回到继承的主色调 */
          50% { fill: var(--text-color-primary); } /* 暂时过渡到主色调 */
      }

      /* SVG 整体的脉冲动画（可选） */
      /* #root > .loader svg {
        animation: 
          logo-pulse 1.5s ease-in-out infinite;
      } */

      @keyframes logo-pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.9;
        }
      }
    </style>
